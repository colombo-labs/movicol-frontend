name: MegaLinter

on:
  push:
    branches: [main, develop, "DOM-*"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  megalinter:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: oxsecurity/megalinter@0e3ce9b9c8c10effb9b269509cc47ca17cae31c7 # v9.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          APPLY_FIXES: none
          DISABLE_LINTERS: SPELL_SPELL,COPYPASTE_JSCPD
          FILTER_REGEX_EXCLUDE: '(node_modules|dist|coverage|data|\.github)/'
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: MegaLinter-reports
          path: megalinter-reports/
