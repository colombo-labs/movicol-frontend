name: CI

on:
  push:
    branches: [main, develop, "DOM-*"]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Prettier check
        run: npx prettier --check "src/**/*.{ts,tsx}"
      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          push: false
          tags: colombolabs/movicol-frontend:latest
